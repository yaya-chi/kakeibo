<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="家計簿">
<meta name="theme-color" content="#1a3a5c">
<title>家計簿</title>
<style>
:root{
  --navy:#1a3a5c;--navy2:#2d5a8e;--navy3:#0f2340;
  --bg:#f0f4f8;--white:#fff;
  --t1:#1e293b;--t2:#475569;--t3:#94a3b8;
  --bdr:#e2e8f0;--red:#dc2626;--grn:#16a34a;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Hiragino Sans',sans-serif;color:var(--t1);-webkit-tap-highlight-color:transparent;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

/* HEADER */
#hdr{background:var(--navy);padding:calc(var(--safe-t) + 12px) 16px 0;flex-shrink:0;z-index:20}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hdr-top h1{font-size:18px;font-weight:800;color:#fff;letter-spacing:.02em}
.ynav{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.14);border-radius:20px;padding:3px 10px}
.ynav button{background:none;border:none;color:rgba(255,255,255,.8);font-size:18px;width:26px;height:26px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center}
.ynav button:active{background:rgba(255,255,255,.2)}
.ynav span{color:#fff;font-size:15px;font-weight:700;min-width:44px;text-align:center}
.mstrip{display:flex;gap:3px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.mstrip::-webkit-scrollbar{display:none}
.mbtn{flex-shrink:0;background:rgba(255,255,255,.13);border:1.5px solid transparent;color:rgba(255,255,255,.65);border-radius:8px;padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.mbtn.active{background:#fff;color:var(--navy);border-color:#fff}

/* TABS — 4つなので小さめフォント */
#tabs{display:flex;background:var(--white);border-bottom:1.5px solid var(--bdr);flex-shrink:0}
.tbtn{flex:1;padding:10px 0;border:none;background:none;font-size:11.5px;color:var(--t3);font-weight:600;cursor:pointer;position:relative;line-height:1.2}
.tbtn.active{color:var(--navy)}
.tbtn.active::after{content:'';position:absolute;bottom:-1.5px;left:15%;right:15%;height:2.5px;background:var(--navy);border-radius:2px}

/* BODY */
#body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(var(--safe-b) + 76px)}

/* SECTION TITLE */
.sec-title{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin:16px 4px 6px}

/* CARD */
.card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04);margin-bottom:6px}

/* 3列グリッド: 項目 | 予算 | 実績 */
.g3{display:grid;grid-template-columns:1fr 90px 90px;align-items:center;min-height:44px;padding:0 10px}
/* 2列グリッド: 項目 | 金額（基本額・特別支出設定用） */
.g2{display:grid;grid-template-columns:1fr 110px;align-items:center;min-height:44px;padding:0 10px}

.th{background:#f1f5f9;min-height:30px!important;border-bottom:1px solid var(--bdr)}
.th>*{font-size:10px;font-weight:700;color:var(--t3);text-align:right}
.th>*:first-child{text-align:left}

.dr{border-bottom:1px solid #f1f5f9}
.dr:last-child{border-bottom:none}
.lbl{font-size:13px;color:var(--t1);padding:10px 4px 10px 0;line-height:1.3}

.ni{width:100%;border:none;outline:none;text-align:right;font-size:13px;color:var(--t1);padding:10px 0;background:transparent;font-family:inherit}
.ni::placeholder{color:#dde2ea}
.ni-auto{color:var(--navy2)!important;font-weight:600!important;background:#f0f6ff!important;border-radius:4px;}
.lbl-input{border-bottom:1px dashed var(--bdr);}
.ni:focus{background:#f8fafc;border-radius:4px}

/* 小計フッター */
.strow{display:grid;align-items:center;padding:9px 10px;background:#f8fafc;border-top:1.5px solid var(--bdr)}
.strow .sl{font-size:12px;font-weight:700;color:var(--t2)}
.strow .sv{font-size:13px;font-weight:700;text-align:right;color:var(--t1)}
.over{color:var(--red)!important}

/* 月合計バナー */
.mtcard{background:var(--navy);border-radius:14px;padding:14px 16px;margin-top:10px;box-shadow:0 2px 8px rgba(26,58,92,.25)}
.mtr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mtr:last-child{margin-bottom:0}
.mtlbl{font-size:13px;color:rgba(255,255,255,.65)}
.mtval{font-size:15px;font-weight:700;color:#fff}
.mtval.over{color:#fca5a5}
.mtval.save{color:#86efac}
.mtdiv{border:none;border-top:1px solid rgba(255,255,255,.15);margin:8px 0}

/* 基本額タブの説明ボックス */
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:11px 14px;margin-bottom:14px}
.info-box p{font-size:12px;color:#1e40af;line-height:1.6}

/* 集計カード */
.scard{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04)}
.scard h3{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9}
.srow:last-child{border-bottom:none}
.sk{font-size:13px;color:var(--t2)}
.sk.b{font-weight:700;color:var(--t1)}
.vv{font-size:14px;font-weight:700;color:var(--t1)}
.vv.big{font-size:16px}
.vv.red{color:var(--red)}
.vv.grn{color:var(--grn)}

/* 保存ボタン */
#savebtn{position:fixed;bottom:calc(var(--safe-b) + 18px);right:16px;background:var(--navy);color:#fff;border:none;border-radius:50px;padding:14px 28px;font-size:15px;font-weight:800;letter-spacing:.04em;cursor:pointer;box-shadow:0 4px 16px rgba(26,58,92,.4);z-index:30}
#savebtn:active{transform:scale(.96)}
#savebtn:disabled{opacity:.6}

/* トースト */
#toast{position:fixed;bottom:calc(var(--safe-b) + 72px);left:50%;transform:translateX(-50%) translateY(8px);background:rgba(15,35,64,.92);color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:40}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* インストールバナー */
#instbanner{position:fixed;bottom:calc(var(--safe-b) + 76px);left:12px;right:12px;background:var(--white);border-radius:14px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:50;display:none;border:1.5px solid var(--bdr)}
#instbanner.show{display:block}
#instbanner p{font-size:13px;color:var(--t2);margin-bottom:8px;line-height:1.5}
#instbanner p strong{color:var(--t1)}
#instbanner .steps{font-size:12px;color:var(--t3);margin-bottom:10px;line-height:1.9}
#instclose{position:absolute;top:10px;right:12px;background:none;border:none;font-size:18px;color:var(--t3);cursor:pointer}
#instbtn{background:var(--navy2);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-top">
      <h1>💴 家計簿</h1>
      <div class="ynav">
        <button onclick="chgYear(-1)">‹</button>
        <span id="ylabel"></span>
        <button onclick="chgYear(1)">›</button>
      </div>
    </div>
    <div class="mstrip" id="mstrip"></div>
  </div>
  <div id="tabs">
    <button class="tbtn active"  onclick="swTab('monthly',this)">月次入力</button>
    <button class="tbtn"         onclick="swTab('base',this)">基本額</button>
    <button class="tbtn"         onclick="swTab('special',this)">特別収支</button>
    <button class="tbtn"         onclick="swTab('summary',this)">集計</button>
  </div>
  <div id="body"></div>
</div>
<button id="savebtn" onclick="doSave()">保存</button>
<div id="toast"></div>
<div id="instbanner">
  <button id="instclose" onclick="closeInst()">✕</button>
  <p><strong>📱 ホーム画面に追加</strong></p>
  <div class="steps">
    1. Safari 下部の 📤 をタップ<br>
    2.「ホーム画面に追加」を選択<br>
    3.「追加」をタップ
  </div>
  <button id="instbtn" onclick="closeInst()">OK</button>
</div>

<script>
// ══ 定数 ══
const INC  = ["給与","児童手当","ちぃちゃん"];
const FIX  = ["住宅ローン","車ローン","教育ローン","電気代","水道代","ガソリン代","携帯代","光回線","保険代","コープ共済","コープ商品代","サブスク","生活費","塾代","保育料","習い事","警備代"];
const VAR  = ["カード支払い","外食費","その他"];
const FREE_COUNT = 3; // 自由入力行数
const SPE  = ["固定資産税","自動車税","車保険","住宅ローン（ボーナス）","車ローン（ボーナス）","教育ローン（ボーナス）"];
const BINC = ["ボーナス夏","ボーナス冬"];
const MON  = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const ALL  = [...FIX,...VAR];
const SKEY = 'kakeibo-v6';

// カード支払いから引く固定費項目
const CARD_DEDUCT = ["ガソリン代","光回線","電気代","水道代","塾代","習い事","サブスク"];

const now = new Date();
let Y = now.getFullYear(), M = now.getMonth(), TAB = 'monthly';
let DB = {};

// ══ データ構造 ══
function emptyYear(){
  const fb = {}; FIX.forEach(k => fb[k] = "");
  const mo = {};
  for(let m = 0; m < 12; m++){
    const d   = {};
    FIX.forEach(k => d[k] = {budget:"", actual:""});
    VAR.forEach(k => d[k] = {actual:""});
    d["カード支払い"] = {actual:"", cardTotal:""};
    // 自由入力行（項目名＋実績）
    const free = [];
    for(let i=0;i<FREE_COUNT;i++) free.push({label:"", actual:""});
    const inc = {}; INC.forEach(k => inc[k] = {actual:""});
    mo[m] = {d, inc, free};
  }
  const sp   = {}; SPE.forEach(k  => sp[k]   = {budget:"", actual:""});
  const binc = {}; BINC.forEach(k => binc[k] = {actual:""});
  return {fb, mo, sp, binc};
}
function yd(){ if(!DB[Y]) DB[Y] = emptyYear(); return DB[Y]; }

function ensureMonth(m){
  const y = yd();
  if(!y.mo[m]) y.mo[m] = {d:{}, inc:{}};
  FIX.forEach(k => { if(!y.mo[m].d[k]) y.mo[m].d[k] = {budget:"", actual:""}; });
  VAR.forEach(k => { if(!y.mo[m].d[k]) y.mo[m].d[k] = {actual:""}; });
  if(!y.mo[m].d["カード支払い"]) y.mo[m].d["カード支払い"] = {actual:"", cardTotal:""};
  if(y.mo[m].d["カード支払い"].cardTotal === undefined) y.mo[m].d["カード支払い"].cardTotal = "";
  if(!y.mo[m].inc) y.mo[m].inc = {};
  INC.forEach(k => { if(!y.mo[m].inc[k]) y.mo[m].inc[k] = {actual:""}; });
  if(!y.sp)   { y.sp = {};   SPE.forEach(k  => y.sp[k]   = {budget:"", actual:""}); }
  if(!y.binc) { y.binc = {}; BINC.forEach(k => y.binc[k] = {actual:""}); }
  BINC.forEach(k => { if(!y.binc[k]) y.binc[k] = {actual:""}; });
  // 自由入力行の補完
  if(!y.mo[m].free) y.mo[m].free = [];
  while(y.mo[m].free.length < FREE_COUNT) y.mo[m].free.push({label:"", actual:""});
}

// カード実績を自動計算して保存
function calcCard(){
  ensureMonth(M);
  const md = yd().mo[M].d;
  const cardTotal = prs(md["カード支払い"].cardTotal);
  const deduct = CARD_DEDUCT.reduce((s,k) => s + prs(md[k] ? md[k].actual : 0), 0);
  const result = cardTotal - deduct;
  md["カード支払い"].actual = result > 0 ? String(result) : "0";
}

// ══ ストレージ ══
async function load(){
  try{ if(window.storage){ const r = await window.storage.get(SKEY); if(r) return JSON.parse(r.value); } }catch{}
  try{ const s = localStorage.getItem(SKEY); if(s) return JSON.parse(s); }catch{}
  return {};
}
async function save(){
  const j = JSON.stringify(DB);
  try{ if(window.storage){ await window.storage.set(SKEY, j); return; } }catch{}
  try{ localStorage.setItem(SKEY, j); }catch{}
}

// ══ 数値ヘルパー ══
const fmt = n => (n == null || n === "") ? "" : (+n).toLocaleString('ja-JP');
const prs = s => { if(s === "" || s == null) return 0; return parseInt(String(s).replace(/,/g,''), 10) || 0; };

const CB = {}; let CI = 0;
function reg(fn){ const k = 'c'+(CI++); CB[k] = fn; return k; }

function ni(val, cbk, readonly=false){
  const v = (val === "" || val == null) ? "" : fmt(val);
  if(readonly) return `<input class="ni ni-auto" inputmode="numeric" value="${v}" placeholder="自動" readonly>`;
  return `<input class="ni" inputmode="numeric" value="${v}" placeholder="0" data-cb="${cbk}" oninput="onNI(this)">`;
}
function onNI(el){
  const raw = el.value.replace(/,/g,'');
  if(!/^\d*$/.test(raw)){ el.value = el.value.slice(0,-1); return; }
  el.value = raw === "" ? "" : Number(raw).toLocaleString('ja-JP');
  const f = CB[el.dataset.cb]; if(f) f(raw);
}
// テキスト入力ハンドラ（自由入力項目名）
function onTI(el){
  const f = CB[el.dataset.cb]; if(f) f(el.value);
}

// ══ ヘッダー ══
function renderHdr(){
  document.getElementById('ylabel').textContent = Y + '年';
  const showM = (TAB === 'monthly');
  document.getElementById('mstrip').innerHTML = showM
    ? MON.map((m,i) => `<button class="mbtn${M===i?' active':''}" onclick="chgM(${i})">${m}</button>`).join('') : '';
  if(showM) setTimeout(() => {
    const bs = document.querySelectorAll('.mbtn');
    if(bs[M]) bs[M].scrollIntoView({inline:'center', behavior:'smooth'});
  }, 50);
}
function chgYear(d){ Y += d; renderAll(); }
function chgM(m){ M = m; renderAll(); }

function swTab(t, el){
  TAB = t;
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

// ══ 月次入力 ══
function renderMonthly(){
  ensureMonth(M);
  const y = yd(), md = y.mo[M].d, inc = y.mo[M].inc;

  // 収入（実績のみ・2列）
  let irows = '';
  INC.forEach(k => {
    const cbA = reg(v => { ensureMonth(M); yd().mo[M].inc[k].actual = v; updMT(); });
    irows += `<div class="g2 dr"><div class="lbl">${k}</div>${ni(inc[k].actual, cbA)}</div>`;
  });
  const iA = INC.reduce((s,k) => s + prs(inc[k].actual), 0);

  // 固定費（予算＋実績・3列）
  let frows = '';
  FIX.forEach(k => {
    const cbB = reg(v => { ensureMonth(M); yd().mo[M].d[k].budget = v; updMT(); });
    const cbA = reg(v => {
      ensureMonth(M); yd().mo[M].d[k].actual = v;
      // CARD_DEDUCTの項目が変わったらカード実績も再計算
      if(CARD_DEDUCT.includes(k)){ calcCard(); updCardRow(); }
      updMT();
    });
    frows += `<div class="g3 dr"><div class="lbl">${k}</div>${ni(md[k].budget, cbB)}${ni(md[k].actual, cbA)}</div>`;
  });
  const fB = FIX.reduce((s,k) => s + prs(md[k].budget), 0);
  const fA = FIX.reduce((s,k) => s + prs(md[k].actual), 0);

  // カード支払い
  const cardData = md["カード支払い"];
  const cbCardTotal = reg(v => {
    ensureMonth(M);
    yd().mo[M].d["カード支払い"].cardTotal = v;
    calcCard(); updCardRow(); updMT();
  });
  const cardRow = `
    <div class="g3 dr" id="card-row">
      <div class="lbl">カード支払い</div>
      ${ni(cardData.cardTotal, cbCardTotal)}
      ${ni(cardData.actual, null, true)}
    </div>`;

  // 外食費・その他（実績のみ）
  const fixedVarRows = ["外食費","その他"].map(k => {
    const cbA = reg(v => { ensureMonth(M); yd().mo[M].d[k].actual = v; updMT(); });
    return `<div class="g2 dr"><div class="lbl">${k}</div>${ni(md[k].actual, cbA)}</div>`;
  }).join('');

  // 自由入力3行（項目名＋実績）
  const freeData = y.mo[M].free;
  const freeRows = freeData.map((row, i) => {
    const cbLabel = reg(v => { ensureMonth(M); yd().mo[M].free[i].label = v; });
    const cbAct   = reg(v => { ensureMonth(M); yd().mo[M].free[i].actual = v; updMT(); });
    const labelInput = `<input class="ni lbl-input" type="text" value="${row.label||''}" placeholder="項目名" data-cb="${cbLabel}" oninput="onTI(this)" style="text-align:left;font-size:12px;color:var(--t2)">`;
    return `<div class="g2 dr">${labelInput}${ni(row.actual, cbAct)}</div>`;
  }).join('');

  // 変動費合計（VAR + free行）
  const varA  = VAR.reduce((s,k) => s + prs(md[k].actual), 0);
  const freeA = freeData.reduce((s,r) => s + prs(r.actual), 0);
  const vA    = varA + freeA;
  const tA    = fA + vA;

  return `
    <div class="sec-title">収入</div>
    <div class="card">
      <div class="g2 th"><div>項目</div><div>実績</div></div>
      ${irows}
      <div class="g2 strow"><span class="sl">合計</span><span class="sv">${iA ? fmt(iA) : '—'}</span></div>
    </div>

    <div class="sec-title">固定費</div>
    <div class="card">
      <div class="g3 th"><div>項目</div><div>予算</div><div>実績</div></div>
      ${frows}
      <div class="g3 strow"><span class="sl">小計</span><span class="sv">${fB ? fmt(fB) : '—'}</span><span class="sv ${fA>fB&&fB?'over':''}">${fA ? fmt(fA) : '—'}</span></div>
    </div>

    <div class="sec-title">変動費</div>
    <div class="info-box" style="margin-bottom:8px">
      <p>💳 カード金額を入力すると、固定費（ガソリン代・光回線・電気代・水道代・塾代・習い事・サブスク）を差し引いた金額が実績に自動反映されます。</p>
    </div>
    <div class="card">
      <div class="g3 th"><div>項目</div><div>金額</div><div>実績</div></div>
      ${cardRow}
    </div>
    <div class="card" style="margin-top:4px">
      <div class="g2 th"><div>項目</div><div>実績</div></div>
      ${fixedVarRows}
      ${freeRows}
      <div class="g2 strow"><span class="sl">小計</span><span class="sv">${vA ? fmt(vA) : '—'}</span></div>
    </div>

    <div class="mtcard" id="mtcard">${mtHTML(iA, fB, tA)}</div>`;
}

function updCardRow(){
  ensureMonth(M);
  const cardData = yd().mo[M].d["カード支払い"];
  const row = document.getElementById('card-row');
  if(!row) return;
  const inputs = row.querySelectorAll('input');
  if(inputs[1]){
    const v = cardData.actual;
    inputs[1].value = (v === "" || v == null) ? "" : fmt(v);
  }
}

function mtHTML(iA, fB, tA){
  const netA = iA - tA;
  const aC = netA >= 0 ? 'save' : 'over';
  const aP = netA >= 0 ? '+' : '';
  return `
    <div class="mtr"><span class="mtlbl">収入（実績）</span><span class="mtval">${iA ? fmt(iA) : '—'}</span></div>
    <div class="mtr"><span class="mtlbl">固定費予算</span><span class="mtval">${fB ? fmt(fB) : '—'}</span></div>
    <div class="mtr"><span class="mtlbl">支出（実績）</span><span class="mtval">${tA ? fmt(tA) : '—'}</span></div>
    <hr class="mtdiv">
    <div class="mtr"><span class="mtlbl">収支差引（実績）</span><span class="mtval ${aC}">${(iA||tA) ? aP+fmt(netA) : '—'}</span></div>`;
}

function updMT(){
  ensureMonth(M);
  const md = yd().mo[M].d, inc = yd().mo[M].inc;
  const iA   = INC.reduce((s,k) => s + prs(inc[k].actual), 0);
  const fB   = FIX.reduce((s,k) => s + prs(md[k].budget), 0);
  const varA = ALL.reduce((s,k) => s + prs(md[k].actual), 0);
  const freeA = (yd().mo[M].free||[]).reduce((s,r) => s + prs(r.actual), 0);
  const tA   = varA + freeA;
  const el   = document.getElementById('mtcard');
  if(el) el.innerHTML = mtHTML(iA, fB, tA);
}

// ══ 基本額タブ ══
function renderBase(){
  const fb = yd().fb || {};
  let rows = '';
  FIX.forEach(k => {
    const cb = reg(v => {
      yd().fb[k] = v;
      for(let m = 0; m < 12; m++){ ensureMonth(m); yd().mo[m].d[k].budget = v; }
    });
    rows += `<div class="g2 dr"><div class="lbl">${k}</div>${ni(fb[k]||'', cb)}</div>`;
  });
  return `
    <div class="info-box"><p>💡 ここで入力した金額は<strong>全月の予算</strong>に自動反映されます。<br>月次入力タブで個別変更もできます。</p></div>
    <div class="sec-title">固定費 基本額（月あたり）</div>
    <div class="card">
      <div class="g2 th"><div>項目</div><div>月基本額</div></div>
      ${rows}
    </div>`;
}

// ══ 特別収支タブ ══
function renderSpecial(){
  ensureMonth(0);
  const y = yd(), sp = y.sp || {}, binc = y.binc || {};

  let birows = '';
  BINC.forEach(k => {
    const cbA = reg(v => { yd().binc[k].actual = v; });
    birows += `<div class="g2 dr"><div class="lbl">${k}</div>${ni(binc[k].actual, cbA)}</div>`;
  });
  const biA = BINC.reduce((s,k) => s + prs(binc[k].actual), 0);

  let sprows = '';
  SPE.forEach(k => {
    const cbB = reg(v => { yd().sp[k].budget = v; });
    const cbA = reg(v => { yd().sp[k].actual = v; });
    sprows += `<div class="g3 dr"><div class="lbl">${k}</div>${ni(sp[k].budget, cbB)}${ni(sp[k].actual, cbA)}</div>`;
  });
  const spB = SPE.reduce((s,k) => s + prs(sp[k].budget), 0);
  const spA = SPE.reduce((s,k) => s + prs(sp[k].actual), 0);

  return `
    <div class="sec-title">特別収入（年間）</div>
    <div class="card">
      <div class="g2 th"><div>項目</div><div>実績</div></div>
      ${birows}
      <div class="g2 strow"><span class="sl">合計</span><span class="sv">${biA ? fmt(biA) : '—'}</span></div>
    </div>
    <div class="sec-title">特別支出（年間）</div>
    <div class="card">
      <div class="g3 th"><div>項目</div><div>予算</div><div>実績</div></div>
      ${sprows}
      <div class="g3 strow"><span class="sl">合計</span><span class="sv">${spB ? fmt(spB) : '—'}</span><span class="sv ${spA>spB&&spB?'over':''}">${spA ? fmt(spA) : '—'}</span></div>
    </div>
    <div class="scard" style="margin-top:10px">
      <h3>特別 収支差引</h3>
      <div class="srow"><span class="sk">特別収入（実績）</span><span class="vv">${biA ? fmt(biA) : '—'}</span></div>
      <div class="srow"><span class="sk">特別支出（実績）</span><span class="vv">${spA ? fmt(spA) : '—'}</span></div>
      <div class="srow"><span class="sk b">差引</span><span class="vv ${(biA-spA)>=0?'grn':'red'}">${(biA||spA) ? ((biA-spA)>=0?'+':'')+fmt(biA-spA) : '—'}</span></div>
    </div>`;
}

// ══ 集計タブ ══
function renderSummary(){
  const y = yd();
  ensureMonth(M);
  const inc = y.mo[M].inc, md = y.mo[M].d;
  const miA = INC.reduce((s,k) => s + prs(inc[k].actual), 0);
  const fB  = FIX.reduce((s,k) => s + prs(md[k].budget), 0);
  const fA  = FIX.reduce((s,k) => s + prs(md[k].actual), 0);
  const vA  = VAR.reduce((s,k) => s + prs(md[k].actual), 0);
  const tA  = fA + vA;
  const mNet = miA - tA;

  let ycIA=0, ycFB=0, ycFA=0, ycVA=0;
  for(let m = 0; m <= M; m++){
    ensureMonth(m);
    const d = y.mo[m].d, ic = y.mo[m].inc;
    INC.forEach(k => { ycIA += prs(ic[k].actual); });
    FIX.forEach(k => { ycFB += prs(d[k].budget); ycFA += prs(d[k].actual); });
    VAR.forEach(k => { ycVA += prs(d[k].actual); });
    (y.mo[m].free||[]).forEach(r => { ycVA += prs(r.actual); });
  }
  const ycTA = ycFA + ycVA, ycNet = ycIA - ycTA;

  const binc = y.binc || {};
  const biA  = BINC.reduce((s,k) => s + prs((binc[k]||{}).actual), 0);
  const spB  = SPE.reduce((s,k)  => s + prs(y.sp[k].budget), 0);
  const spA  = SPE.reduce((s,k)  => s + prs(y.sp[k].actual), 0);

  let aIA=0, aFB=0, aFA=0, aVA=0;
  for(let m = 0; m < 12; m++){
    ensureMonth(m);
    const d = y.mo[m].d, ic = y.mo[m].inc;
    INC.forEach(k => { aIA += prs(ic[k].actual); });
    FIX.forEach(k => { aFB += prs(d[k].budget); aFA += prs(d[k].actual); });
    VAR.forEach(k => { aVA += prs(d[k].actual); });
    (y.mo[m].free||[]).forEach(r => { aVA += prs(r.actual); });
  }
  const aTA = aFA + aVA;
  const totalInc = aIA + biA, totalExp = aTA + spA, totalNet = totalInc - totalExp;

  const V = v => v ? fmt(v) : '—';
  const D = (d, has) => has
    ? `<span class="vv ${d>=0?'grn':'red'}">${d>=0?'+':''}${fmt(d)}</span>`
    : `<span class="vv">—</span>`;

  return `
    <div class="scard">
      <h3>${MON[M]}　月次集計</h3>
      <div class="srow"><span class="sk">収入（実績）</span><span class="vv">${V(miA)}</span></div>
      <div class="srow" style="border-top:1px solid #e2e8f0;margin-top:4px;padding-top:8px"><span class="sk">固定費予算</span><span class="vv">${V(fB)}</span></div>
      <div class="srow"><span class="sk">固定費実績</span><span class="vv ${fA>fB&&fB?'red':''}">${V(fA)}</span></div>
      <div class="srow"><span class="sk">変動費実績</span><span class="vv">${V(vA)}</span></div>
      <div class="srow"><span class="sk">支出合計（実績）</span><span class="vv">${V(tA)}</span></div>
      <div class="srow" style="border-top:1px solid #e2e8f0;margin-top:4px;padding-top:8px"><span class="sk b">収支差引（実績）</span>${D(mNet, miA||tA)}</div>
    </div>
    <div class="scard">
      <h3>年間累計（1〜${M+1}月）</h3>
      <div class="srow"><span class="sk">収入累計（実績）</span><span class="vv">${V(ycIA)}</span></div>
      <div class="srow" style="border-top:1px solid #e2e8f0;margin-top:4px;padding-top:8px"><span class="sk">固定費予算累計</span><span class="vv">${V(ycFB)}</span></div>
      <div class="srow"><span class="sk">固定費実績累計</span><span class="vv">${V(ycFA)}</span></div>
      <div class="srow"><span class="sk">変動費実績累計</span><span class="vv">${V(ycVA)}</span></div>
      <div class="srow"><span class="sk">支出累計（実績）</span><span class="vv">${V(ycTA)}</span></div>
      <div class="srow" style="border-top:1px solid #e2e8f0;margin-top:4px;padding-top:8px"><span class="sk b">収支差引累計（実績）</span>${D(ycNet, ycIA||ycTA)}</div>
    </div>
    <div class="scard">
      <h3>特別</h3>
      <div class="srow"><span class="sk">特別収入（実績）</span><span class="vv">${V(biA)}</span></div>
      <div class="srow"><span class="sk">特別支出（予算）</span><span class="vv">${V(spB)}</span></div>
      <div class="srow"><span class="sk">特別支出（実績）</span><span class="vv">${V(spA)}</span></div>
      <div class="srow"><span class="sk b">特別収支差引</span>${D(biA-spA, biA||spA)}</div>
    </div>
    <div class="scard">
      <h3>${Y}年　年間総まとめ</h3>
      <div class="srow"><span class="sk">月次収入合計</span><span class="vv">${V(aIA)}</span></div>
      <div class="srow"><span class="sk">特別収入合計</span><span class="vv">${V(biA)}</span></div>
      <div class="srow"><span class="sk b">収入合計</span><span class="vv big">${V(totalInc)}</span></div>
      <div class="srow" style="border-top:1px solid #e2e8f0;margin-top:4px;padding-top:8px"><span class="sk">月次支出合計（実績）</span><span class="vv">${V(aTA)}</span></div>
      <div class="srow"><span class="sk">特別支出合計（実績）</span><span class="vv">${V(spA)}</span></div>
      <div class="srow"><span class="sk b">支出合計</span><span class="vv big">${V(totalExp)}</span></div>
      <div class="srow" style="border-top:1.5px solid #e2e8f0;padding-top:10px;margin-top:6px">
        <span class="sk b">年間収支差引</span>
        <span class="vv big ${totalNet>=0?'grn':'red'}">${(totalInc||totalExp)?(totalNet>=0?'+':'')+fmt(totalNet):'—'}</span></div>
    </div>`;
}

// ══ 描画 ══
function renderBody(){
  Object.keys(CB).forEach(k => delete CB[k]); CI = 0;
  let h = '';
  if(TAB === 'monthly')      h = renderMonthly();
  else if(TAB === 'base')    h = renderBase();
  else if(TAB === 'special') h = renderSpecial();
  else                       h = renderSummary();
  document.getElementById('body').innerHTML = h;
}
function renderAll(){ renderHdr(); renderBody(); }

// ══ 保存 ══
async function doSave(){
  const b = document.getElementById('savebtn');
  b.disabled = true; b.textContent = '保存中…';
  await save();
  b.disabled = false; b.textContent = '保存';
  showToast('保存しました ✓');
}

let TT;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(TT); TT = setTimeout(() => t.classList.remove('show'), 2200);
}

function closeInst(){
  document.getElementById('instbanner').classList.remove('show');
  try{ localStorage.setItem('inst-done','1'); }catch{}
}
function maybeShowInst(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSA  = window.matchMedia('(display-mode: standalone)').matches || !!navigator.standalone;
  let done = false; try{ done = !!localStorage.getItem('inst-done'); }catch{}
  if(isIOS && !isSA && !done) setTimeout(() => document.getElementById('instbanner').classList.add('show'), 1800);
}

(async () => {
  DB = await load();
  renderAll();
  maybeShowInst();
})();
</script>
